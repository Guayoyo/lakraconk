<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAKRACONK | Jesus Villarreal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --r: #FF0000; --y: #FFFF00; --blue: #0000FF; 
            --black: #000; --white: #fff; 
            --stroke: 15px; /* Grosor del borde blanco */
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body, html { 
            background: var(--white); 
            overflow: hidden; 
            width: 100%; height: 100%;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
        }

        /* --- CUADRÍCULA DE FONDO --- */
        #main-grid { 
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            grid-auto-rows: 200px; 
            grid-auto-flow: dense; 
            gap: var(--stroke); 
            padding: var(--stroke); 
            background: var(--white);
            z-index: 1;
        }
        
        .item { overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; }
        .item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        /* Variaciones de tamaño */
        .item.m { grid-column: span 2; grid-row: span 2; }
        .item.w { grid-column: span 3; }
        .item.t { grid-row: span 2; }

        .g-item { 
            grid-column: span 2; grid-row: span 2; 
            background: #000; color: #fff; 
            font-size: 3rem; text-align: center; line-height: 0.8; 
            font-weight: 900; z-index: 2;
        }

        /* --- NAVEGACIÓN (TEST 19) --- */
        #astronaut-group { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; pointer-events: none; }
        .btn { 
            position: fixed; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; color: #fff; z-index: 1000; font-weight: 900;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: auto;
        }
        
        .btn-raw { width: 120px; height: 120px; background: var(--r); border-radius: 50%; top: 20%; left: 20%; }
        .btn-works { width: 110px; height: 110px; background: var(--blue); top: 50%; right: 15%; }
        .btn-info { 
            width: 140px; height: 140px; background: var(--y); color: #000;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); bottom: 20%; left: 25%;
            padding-top: 40px;
        }

        /* --- OVERLAYS --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5000; display: none; background: #000; color: #fff;
            padding: 100px 10%; overflow-y: auto;
        }
        
        #closeX {
            position: fixed; top: 30px; right: 30px; z-index: 6000;
            font-size: 40px; color: #fff; cursor: pointer; display: none;
            mix-blend-mode: difference;
        }
    </style>
</head>
<body>

    <div id="closeX">X</div>
    
    <main id="main-grid">
        <div class="item g-item">LAKRA<br>CONK</div>
    </main>

    <div id="btnR" class="btn btn-raw">RAW</div>
    <div id="btnW" class="btn btn-works">WORKS</div>
    <div id="btnI" class="btn btn-info">INFO</div>

    <div id="ov" class="overlay">
        <h1 id="ov-title" style="font-size: 5rem; margin-bottom: 20px;"></h1>
        <p style="font-size: 1.5rem; text-transform: none; line-height: 1.4;">Jesus Villarreal (@lakraconk) experimental artistic practice through printmaking. Static vibration through visual adjustments.</p>
    </div>

    <script>
        // Generar Fondo
        const grid = document.getElementById('main-grid');
        const types = ['', 'm', 'w', 't'];
        const imgTypes = ['s', 'm', 'w', 't'];

        for (let i = 0; i < 30; i++) {
            const div = document.createElement('div');
            const type = types[Math.floor(Math.random() * types.length)];
            div.className = `item ${type}`;
            
            const imgT = imgTypes[Math.floor(Math.random() * imgTypes.length)];
            const num = Math.floor(Math.random() * 11) + 1;
            
            div.innerHTML = `<img src="img/${imgT}${num}.webp" loading="lazy">`;
            grid.appendChild(div);
        }

        // Interacción de Botones
        const btns = document.querySelectorAll('.btn');
        const ov = document.getElementById('ov');
        const closeX = document.getElementById('closeX');

        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                ov.style.display = 'block';
                closeX.style.display = 'block';
                document.getElementById('ov-title').innerText = btn.innerText;
                ov.style.backgroundColor = getComputedStyle(btn).backgroundColor;
                ov.style.color = btn.innerText === "INFO" ? "#000" : "#fff";
            });
        });

        closeX.addEventListener('click', () => {
            ov.style.display = 'none';
            closeX.style.display = 'none';
        });

        // Parallax suave
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            btns.forEach((btn, i) => {
                const speed = (i + 1) * 0.5;
                btn.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body>
</html>
