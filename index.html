<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKRACONK | Test 19</title>
    <style>
        :root {
            --white: #ffffff;
            --black: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--black);
            font-family: 'Helvetica', sans-serif;
            overflow: hidden;
        }

        /* MOSAICO DE FONDO */
        #grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 300px;
            grid-auto-flow: dense;
            z-index: 1; /* Fondo */
            opacity: 0.9;
        }

        .item { position: relative; overflow: hidden; border: 0.5px solid rgba(255,255,255,0.1); }
        .item.s { grid-column: span 1; grid-row: span 1; }
        .item.m { grid-column: span 2; grid-row: span 2; }
        .item.w { grid-column: span 3; grid-row: span 1; }
        .item.t { grid-column: span 1; grid-row: span 2; }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* CAPA DE INTERFAZ (UI) */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100; /* Encima de todo */
            pointer-events: none;
        }

        .center-brand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--black);
            color: var(--white);
            padding: 20px 60px;
            font-weight: 900;
            font-size: clamp(2rem, 8vw, 6rem);
            letter-spacing: -3px;
            pointer-events: auto;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* FORMAS GEOMÉTRICAS */
        .shape {
            position: absolute;
            background: var(--white);
            mix-blend-mode: difference; /* Esto hará que cambien de color según el fondo */
            pointer-events: auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            top: 20%;
            left: 20%;
        }

        .square {
            width: 90px;
            height: 90px;
            bottom: 25%;
            right: 20%;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 60px solid transparent;
            border-right: 60px solid transparent;
            border-bottom: 100px solid var(--white);
            background: transparent;
            bottom: 25%;
            left: 20%;
        }

        .shape span {
            color: var(--black);
            font-weight: bold;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0;
            transition: 0.3s;
        }

        .shape:hover span { opacity: 1; }
    </style>
</head>
<body>

    <div id="grid"></div>

    <div class="ui-layer">
        <div class="center-brand">LAKRACONK</div>
        
        <div class="shape circle"><span>Info</span></div>
        <div class="shape square"><span>Work</span></div>
        <div class="shape triangle"><span>Mail</span></div>
    </div>

    <script>
        const grid = document.getElementById('grid');
        const types = ['s', 'm', 'w', 't'];
        const total = 40;

        for (let i = 0; i < total; i++) {
            const type = types[Math.floor(Math.random() * types.length)];
            const num = Math.floor(Math.random() * 11) + 1;
            const div = document.createElement('div');
            div.className = `item ${type}`;
            const img = document.createElement('img');
            img.src = `img/${type}${num}.webp`;
            div.appendChild(img);
            grid.appendChild(div);
        }

        // FÍSICA DE MOVIMIENTO
        const shapes = document.querySelectorAll('.shape');
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 60;
            const y = (e.clientY / window.innerHeight - 0.5) * 60;
            
            shapes.forEach((s, i) => {
                const factor = (i + 1) * 0.8;
                s.style.transform = `translate(${x * factor}px, ${y * factor}px)`;
            });
        });
    </script>
</body>
</html>
