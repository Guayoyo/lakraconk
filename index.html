<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAKRACONK | Jesus Villarreal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --r: #FF0000; --y: #FFFF00; --blue: #0000FF; 
            --black: #000; --white: #fff; 
            --transit: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--white); 
            overflow-x: hidden; 
            width: 100%;
            min-height: 100dvh;
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
        }

        /* --- ÓRBITAS ESCRITORIO --- */
        @keyframes orb1 { 0%, 100% { top: 15%; left: 10%; transform: rotate(0deg); } 50% { top: 75%; left: 80%; transform: rotate(180deg); } }
        @keyframes orb2 { 0%, 100% { top: 80%; left: 70%; transform: rotate(0deg); } 50% { top: 15%; left: 20%; transform: rotate(-180deg); } }
        @keyframes orb3 { 0%, 100% { top: 50%; left: 80%; transform: rotate(0deg); } 50% { top: 50%; left: 10%; transform: rotate(360deg); } }

        #astronaut-group { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; pointer-events: none; }
        .btn { position: fixed; display: flex; align-items: center; justify-content: center; transition: var(--transit); cursor: pointer; color: var(--white); border: none; pointer-events: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 10; font-weight: 900; }
        
        /* EXPANSIÓN */
        .no-shape { border-radius: 0 !important; clip-path: none !important; transition: none !important; }
        .expanded { top: 0 !important; left: 0 !important; width: 100vw !important; height: 100dvh !important; animation: none !important; z-index: 10000 !important; transform: none !important; margin: 0 !important; }

        .btn-red-circle { width: 125px; height: 125px; background: var(--r); border-radius: 50%; animation: orb1 40s linear infinite; }
        .btn-blue-square { width: 115px; height: 115px; background: var(--blue); animation: orb3 60s linear infinite; }
        .btn-yellow-tri { width: 145px; height: 145px; background: var(--y); clip-path: polygon(50% 0%, 0% 100%, 100% 100%); animation: orb2 50s linear infinite; padding-top: 35px; color: var(--black); }

        #btnW.expanded { background-color: var(--white) !important; color: var(--blue) !important; transition: none; }
        #btnR.expanded { background-color: var(--black) !important; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; z-index: 10001; display: none; overflow-y: auto; overflow-x: hidden; padding: 0; background: transparent; }
        .show { display: block !important; }

        #closeX { position: fixed; top: 25px; right: 25px; z-index: 11000; font-size: 45px; cursor: pointer; display: none; font-weight: 900; line-height: 1; mix-blend-mode: difference; color: white; }

        /* --- HOME GRID --- */
        #main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); grid-auto-rows: 150px; grid-auto-flow: dense; gap: 0; padding: 0; width: 100vw; min-height: 100vh; }
        .item { border: none; display: flex; align-items: center; justify-content: center; background: #fff; overflow: hidden; }
        .item img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .item.s { grid-column: span 1; grid-row: span 1; }
        .item.m { grid-column: span 2; grid-row: span 2; }
        .item.w { grid-column: span 4; grid-row: span 2; }
        .item.t { grid-column: span 2; grid-row: span 4; }
        
        .g-item { grid-column: span 4; grid-row: span 4; background: #000; color: #fff; font-size: 3.5rem; text-align: center; line-height: 0.8; z-index: 2; display: flex; align-items: center; justify-content: center; font-weight: 900; }

        /* --- INFO --- */
        #ovI { background: var(--y); color: #000; }
        .info-inner { padding: 100px 10vw; max-width: 900px; margin: 0 auto; }
        .info-text { text-transform: none; line-height: 1.5; font-size: 1.2rem; }
        .contact-footer { margin-top: 50px; padding-top: 30px; border-top: 3px solid #000; display: flex; gap: 40px; }
        .contact-footer a { color: #000; text-decoration: none; font-weight: 900; font-size: 1.8rem; }

        /* =========================================================
           --- CORRECCIÓN MÓVIL (Estilo Developer Mode) ---
           ========================================================= */
        @media (max-width: 600px) {
            /* 1. Contenedor fijo en la esquina inferior derecha */
            #astronaut-group { 
                left: auto; 
                right: 25px; 
                bottom: 30px; 
                top: auto; 
                width: 100px; /* Ancho del bloque vertical */
                height: 320px; /* Altura total para apilar los 3 botones con espacio */
                pointer-events: none; 
                display: flex;
                flex-direction: column-reverse; /* Orden inverso: el primero en HTML va abajo */
                align-items: center;
                justify-content: flex-start;
            }

            /* 2. Botones alineados verticalmente sin órbitas */
            .btn { 
                position: relative !important; /* Forzamos a que sigan el flujo flex vertical */
                top: auto !important;
                left: auto !important;
                right: auto !important;
                bottom: auto !important;
                transform: none !important; 
                animation: none !important; /* Desactivamos órbitas */
                margin-top: 15px; /* Espacio ligero entre ellos */
                pointer-events: auto;
                box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            }

            /* 3. Orden y tamaños: Triángulo (INFO) arriba, Cuadrado (WORKS), Círculo (RAW) */
            
            /* Círculo (RAW) - Es el id: btnR en JS */
            .btn-red-circle { 
                width: 85px; height: 85px; 
                order: 1; /* Abajo del todo */
            }

            /* Cuadrado (WORKS) - Es el id: btnW en JS */
            .btn-blue-square { 
                width: 80px; height: 80px; 
                order: 2; /* Medio */
            }

            /* Triángulo (INFO) - Es el id: btnI en JS */
            .btn-yellow-tri { 
                width: 95px; height: 95px; 
                order: 3; /* Arriba del todo */
                padding-top: 25px; font-size: 0.8rem; 
            }

            /* 4. Ajustes del Grid de fondo */
            .g-item { font-size: 2rem; grid-column: span 2; grid-row: span 2; }
            #main-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); grid-auto-rows: 100px; }
            
            /* 5. Ajustes Overlays */
            #ovW { padding: 80px 5vw; }
            #ovW h1 { font-size: 18vw; }
            #ovI { padding: 80px 5vw; }
            #ovI h1 { font-size: 15vw; }
        }
    </style>
</head>
<body>
    <div id="closeX">X</div>
    
    <div id="astronaut-group">
        </div>

    <div id="ovR" class="overlay">
        <div style="background: black; min-height: 100vh; padding: 100px 0;"><h1 style="color: white; text-align: center; font-size: 8vw;">RAW</h1></div>
        <div class="raw-content" id="raw-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0; background: black;"></div>
    </div>

    <div id="ovW" class="overlay">
        <div class="works-inner">
            <h1 style="font-size: 10vw; color: var(--blue); text-align: center;">WORKS</h1>
            <div id="works-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 40px;"></div>
        </div>
    </div>
    
    <div id="ovI" class="overlay">
        <div class="info-inner">
            <h1>INFO</h1>
            <div class="info-text">
                <p>Jesus Villarreal (@lakraconk) has a background in both Graphic and Industrial Design... [BIOGRAFÍA COMPLETA]</p>
                <div class="contact-footer">
                    <a href="https://www.instagram.com/lakraconk" target="_blank">IG</a>
                    <a href="mailto:hola@lakraconk.com">✉</a>
                </div>
            </div>
        </div>
    </div>

    <main id="main-grid">
        <div class="item g-item">LAKRA<br>CONK</div>
    </main>

    <script>
        const types = ['s', 'm', 'w', 't'];
        const variations = 11;

        // Home Grid
        const gridBg = document.getElementById('main-grid');
        for (let i = 1; i <= 40; i++) {
            const div = document.createElement('div');
            const type = types[Math.floor(Math.random() * types.length)];
            const num = Math.floor(Math.random() * variations) + 1;
            div.className = `item ${type}`;
            div.innerHTML = `<img src="img/${type}${num}.webp" loading="lazy">`;
            gridBg.appendChild(div);
        }

        // Creación Dinámica de Botones (Test 19 Original)
        const group = document.getElementById('astronaut-group');
        const sections = [
            { id: 'R', label: 'RAW', class: 'btn-red-circle' },
            { id: 'W', label: 'WORKS', class: 'btn-blue-square' },
            { id: 'I', label: 'INFO', class: 'btn-yellow-tri' }
        ];

        const btns = [];
        sections.forEach(sec => {
            const btn = document.createElement('div');
            btn.id = `btn${sec.id}`;
            btn.className = `btn ${sec.class}`;
            btn.innerHTML = `<span>${sec.label}</span>`;
            group.appendChild(btn);
            btns.push(btn);
        });

        // Lógica de Expansión
        const overs = [document.getElementById('ovR'), document.getElementById('ovW'), document.getElementById('ovI')];
        const cl = document.getElementById('closeX');

        btns.forEach((btn, idx) => {
            btn.addEventListener('click', () => {
                const r = btn.getBoundingClientRect();
                btn.style.top = r.top + 'px'; btn.style.left = r.left + 'px';
                btn.classList.add('no-shape');
                setTimeout(() => {
                    btn.classList.add('expanded'); 
                    overs[idx].classList.add('show'); 
                    cl.style.display = 'block';
                    document.body.style.overflow = 'hidden';
                }, 20);
            });
        });

        cl.onclick = () => {
            document.querySelectorAll('.expanded').forEach(el => el.classList.remove('expanded', 'no-shape'));
            document.querySelectorAll('.show').forEach(el => el.classList.remove('show'));
            cl.style.display = 'none';
            document.body.style.overflow = '';
            setTimeout(() => { btns.forEach(b => { b.style.top = ''; b.style.left = ''; }); }, 600);
        };
    </script>
</body>
</html>
