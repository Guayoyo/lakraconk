<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKRACONK | Jesus Villarreal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --r: #FF0000; --y: #FFFF00; --blue: #0000FF; 
            --black: #000; --white: #fff; 
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Outfit', sans-serif; background: #000; }

        /* --- FONDO DE IMÁGENES --- */
        #main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            grid-auto-rows: 200px;
            grid-auto-flow: dense;
            width: 100vw;
            height: 100vh;
            position: fixed;
            z-index: 1;
        }
        .item { border: 1px solid #000; overflow: hidden; }
        .item img { width: 100%; height: 100%; object-fit: cover; }
        .item.m { grid-column: span 2; grid-row: span 2; }
        .item.w { grid-column: span 3; }

        /* --- UI CENTRAL --- */
        .center-brand {
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #000; color: #fff;
            padding: 20px 60px; font-size: 5rem; font-weight: 900;
            z-index: 10; letter-spacing: -4px; pointer-events: none;
            text-transform: uppercase;
        }

        /* --- BOTONES FLOTANTES --- */
        .btn { 
            position: fixed; display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: #fff; z-index: 100; font-weight: 900;
            transition: width 0.6s, height 0.6s, top 0.6s, left 0.6s, border-radius 0.6s;
            text-decoration: none;
        }

        .btn-raw { width: 120px; height: 120px; background: var(--r); border-radius: 50%; top: 20%; left: 15%; }
        .btn-works { width: 110px; height: 110px; background: var(--blue); top: 50%; right: 10%; }
        .btn-info { 
            width: 140px; height: 140px; background: var(--y); color: #000;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            bottom: 15%; left: 20%; padding-top: 40px;
        }

        /* --- ESTADO EXPANDIDO --- */
        .expanded {
            top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important;
            width: 100vw !important; height: 100vh !important;
            border-radius: 0 !important; clip-path: none !important;
            z-index: 9999 !important;
        }

        .content-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10000; display: none; padding: 100px 10%;
            overflow-y: auto; color: #fff;
        }

        #closeX {
            position: fixed; top: 30px; right: 30px; z-index: 10001;
            font-size: 40px; color: #fff; cursor: pointer; display: none; font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="closeX">X</div>
    <div class="center-brand">LAKRACONK</div>
    
    <div id="btnR" class="btn btn-raw">RAW</div>
    <div id="btnW" class="btn btn-works">WORKS</div>
    <div id="btnI" class="btn btn-info">INFO</div>

    <main id="main-grid"></main>

    <div id="ov" class="content-overlay">
        <h1 id="ov-title" style="font-size: 5rem; margin-bottom: 20px;"></h1>
        <p id="ov-text" style="font-size: 1.5rem; line-height: 1.4; text-transform: none;"></p>
    </div>

    <script>
        const grid = document.getElementById('main-grid');
        const types = ['', 'm', 'w'];
        
        // Crear Fondo
        for (let i = 0; i < 40; i++) {
            const type = types[Math.floor(Math.random() * types.length)];
            const div = document.createElement('div');
            div.className = `item ${type}`;
            const num = Math.floor(Math.random() * 11) + 1;
            const t = ['s','m','w','t'][Math.floor(Math.random()*4)];
            div.innerHTML = `<img src="img/${t}${num}.webp">`;
            grid.appendChild(div);
        }

        // Lógica de Expansión
        const btns = document.querySelectorAll('.btn');
        const ov = document.getElementById('ov');
        const closeX = document.getElementById('closeX');
        const infoText = "Jesus Villarreal (@lakraconk) is a visual artist and designer exploring static vibration through manual printmaking and experimental graphics.";

        btns.forEach(btn => {
            btn.onclick = () => {
                btn.classList.add('expanded');
                setTimeout(() => {
                    ov.style.display = 'block';
                    closeX.style.display = 'block';
                    document.getElementById('ov-title').innerText = btn.innerText;
                    document.getElementById('ov-text').innerText = btn.innerText === "INFO" ? infoText : "Contenido en construcción...";
                }, 600);
            };
        });

        closeX.onclick = () => {
            document.querySelector('.expanded').classList.remove('expanded');
            ov.style.display = 'none';
            closeX.style.display = 'none';
        };

        // Movimiento Parallax suave
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 50;
            const y = (e.clientY / window.innerHeight - 0.5) * 50;
            btns.forEach((btn, i) => {
                const speed = (i + 1) * 0.4;
                btn.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
            });
        });
    </script>
</body>
</html>
