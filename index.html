<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAKRACONK | Jesus Villarreal</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --r: #FF0000; --y: #FFFF00; --blue: #0000FF; 
            --black: #000; --white: #fff; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--white); 
            overflow-x: hidden; 
            font-family: 'Outfit', sans-serif;
            text-transform: uppercase;
        }

        /* --- NAVEGACIÓN --- */
        #ui-nav { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; }
        .btn { 
            position: absolute; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; color: var(--white); font-weight: 900; z-index: 1001; 
            pointer-events: auto; transition: transform 0.3s ease;
        }
        .btn-red { width: 120px; height: 120px; background: var(--r); border-radius: 50%; top: 20%; left: 15%; }
        .btn-blue { width: 110px; height: 110px; background: var(--blue); top: 50%; right: 15%; }
        .btn-yellow { 
            width: 140px; height: 140px; background: var(--y); color: var(--black);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%); bottom: 15%; left: 20%;
            padding-top: 35px;
        }

        /* --- OVERLAYS --- */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 2000; display: none; overflow-y: auto; background: var(--white); 
        }
        #closeX { 
            position: fixed; top: 25px; right: 25px; z-index: 3000; 
            font-size: 45px; cursor: pointer; display: none; font-weight: 900; 
        }

        /* --- HOME GRID --- */
        #main-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); grid-auto-rows: 150px; grid-auto-flow: dense; width: 100%; }
        .item { overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .item img { width: 100%; height: 100%; object-fit: cover; }
        .item.m { grid-column: span 2; grid-row: span 2; }
        .item.w { grid-column: span 4; grid-row: span 2; }
        .g-item { grid-column: span 4; grid-row: span 4; background: #000; color: #fff; font-size: 3.5rem; text-align: center; line-height: 0.8; font-weight: 900; }

        /* --- WORKS (ESTILO COLECCIÓN / REFERENCIA) --- */
        #ovW .works-inner { padding: 80px 5vw; text-align: center; }
        #ovW h1 { font-size: 10vw; color: var(--blue); margin-bottom: 60px; font-weight: 900; letter-spacing: -2px; }
        
        .gallery-works { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 50px 30px; 
            max-width: 1600px; 
            margin: 0 auto;
        }
        
        .artwork { display: flex; flex-direction: column; align-items: center; }
        .artwork-box { 
            width: 100%; 
            aspect-ratio: 32 / 41; 
            border: 5px solid var(--blue); 
            background: #f4f4f4; 
            margin-bottom: 15px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .artwork p { color: var(--blue); font-weight: 900; font-size: 1.1rem; margin-top: 5px; }
        .artwork span { color: var(--blue); font-size: 0.8rem; font-weight: 400; opacity: 0.8; }

        /* --- INFO --- */
        #ovI { background: var(--y); color: var(--black); }
        .info-inner { padding: 100px 10vw; max-width: 900px; margin: 0 auto; }
        .info-text { text-transform: none; line-height: 1.6; font-size: 1.2rem; }

        @media (max-width: 600px) {
            .g-item { font-size: 2rem; grid-column: span 2; }
            #main-grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); grid-auto-rows: 100px; }
            .gallery-works { grid-template-columns: 1fr 1fr; gap: 20px; }
            #ovW h1 { font-size: 18vw; }
        }
    </style>
</head>
<body>

    <div id="closeX">X</div>

    <nav id="ui-nav">
        <div id="btnR" class="btn btn-red">RAW</div>
        <div id="btnW" class="btn btn-blue">WORKS</div>
        <div id="btnI" class="btn btn-yellow">INFO</div>
    </nav>

    <div id="ovR" class="overlay" style="background: #000; color: #fff; padding: 100px 5vw;">
        <h1 style="font-size: 10vw; text-align: center;">RAW</h1>
        <div id="raw-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 5px; margin-top: 50px;"></div>
    </div>

    <div id="ovW" class="overlay">
        <div class="works-inner">
            <h1>WORKS</h1>
            <div class="gallery-works" id="works-list">
                </div>
        </div>
    </div>

    <div id="ovI" class="overlay">
        <div class="info-inner">
            <h1 style="font-size: 8vw; margin-bottom: 40px;">INFO</h1>
            <div class="info-text">
                <p>Jesus Villarreal (@lakraconk) has a background in both Graphic and Industrial Design... [BIOGRAFÍA]</p>
            </div>
        </div>
    </div>

    <main id="main-grid">
        <div class="item g-item">LAKRA<br>CONK</div>
    </main>

    <script>
        const variations = 11;
        
        // 1. Home Grid
        const grid = document.getElementById('main-grid');
        for (let i = 1; i <= 40; i++) {
            const div = document.createElement('div');
            const type = ['','m','w'][Math.floor(Math.random()*3)];
            div.className = `item ${type}`;
            const num = Math.floor(Math.random() * variations) + 1;
            div.innerHTML = `<img src="img/s${num}.webp">`;
            grid.appendChild(div);
        }

        // 2. Llenar Works (Colección con bordes azules)
        const worksList = document.getElementById('works-list');
        const totalWorks = 10; // Ajusta cuántas piezas quieres mostrar
        for (let i = 1; i <= totalWorks; i++) {
            const art = document.createElement('div');
            art.className = 'artwork';
            art.innerHTML = `
                <div class="artwork-box"></div>
                <p>STATIC VIBRATION</p>
                <span>32X41 CM</span>
            `;
            worksList.appendChild(art);
        }

        // 3. Navegación
        const btns = [document.getElementById('btnR'), document.getElementById('btnW'), document.getElementById('btnI')];
        const overs = [document.getElementById('ovR'), document.getElementById('ovW'), document.getElementById('ovI')];
        const cl = document.getElementById('closeX');

        btns.forEach((btn, idx) => {
            btn.onclick = () => {
                overs[idx].style.display = 'block';
                cl.style.display = 'block';
                cl.style.color = (idx === 0) ? '#fff' : (idx === 1 ? 'var(--blue)' : '#000');
                document.body.style.overflow = 'hidden';
            }
        });

        cl.onclick = () => {
            overs.forEach(ov => ov.style.display = 'none');
            cl.style.display = 'none';
            document.body.style.overflow = '';
        }

        // 4. Parallax
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 40;
            const y = (e.clientY / window.innerHeight - 0.5) * 40;
            btns.forEach((b, i) => {
                b.style.transform = `translate(${x * (i+1) * 0.5}px, ${y * (i+1) * 0.5}px)`;
            });
        });
    </script>
</body>
</html>
