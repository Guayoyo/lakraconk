<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKRACONK | Official Site</title>
    <style>
        :root {
            --white: #ffffff;
            --black: #000000;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--white);
            font-family: 'Helvetica', sans-serif;
            overflow: hidden; /* Mantenemos el scroll bloqueado para el efecto app */
        }

        /* FONDO DE IMÁGENES (Mosaico dinámico) */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            grid-auto-rows: 250px;
            grid-auto-flow: dense;
            gap: 0;
            filter: grayscale(1) contrast(1.2); /* Forzamos el look radical */
            opacity: 0.8;
        }

        .item { position: relative; overflow: hidden; }
        .item.s { grid-column: span 1; grid-row: span 1; }
        .item.m { grid-column: span 2; grid-row: span 2; }
        .item.w { grid-column: span 3; grid-row: span 1; }
        .item.t { grid-column: span 1; grid-row: span 2; }

        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* CAPA DE NAVEGACIÓN (TEST 19) */
        .ui-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* Bloque Central */
        .center-brand {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--black);
            color: var(--white);
            padding: 20px 60px;
            font-weight: 900;
            font-size: clamp(2rem, 8vw, 5rem);
            letter-spacing: -2px;
            text-align: center;
            box-shadow: 20px 20px 0px rgba(0,0,0,0.1);
        }

        /* Formas Flotantes */
        .shape {
            position: absolute;
            background: var(--black);
            pointer-events: auto;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.3s ease, filter 0.3s ease;
            box-shadow: 10px 10px 30px rgba(0,0,0,0.2);
        }

        .shape:hover {
            transform: scale(1.1) rotate(5deg);
            filter: invert(1); /* Efecto negativo al pasar el mouse */
        }

        .shape span {
            color: var(--white);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .shape:hover span { opacity: 1; }

        /* Estilos de las Formas */
        .circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            top: 15%;
            left: 15%;
        }

        .square {
            width: 110px;
            height: 110px;
            bottom: 20%;
            right: 15%;
        }

        .triangle {
            width: 0;
            height: 0;
            border-left: 70px solid transparent;
            border-right: 70px solid transparent;
            border-bottom: 120px solid var(--black);
            background: none;
            box-shadow: none;
            bottom: 15%;
            left: 20%;
        }

        .triangle span {
            position: absolute;
            top: 60px;
            left: -30px;
        }

    </style>
</head>
<body>

    <div class="grid-container" id="grid"></div>

    <div class="ui-layer">
        <div class="center-brand">LAKRACONK</div>

        <div class="shape circle" onclick="alert('INFO: Jesus Villarreal')">
            <span>Info</span>
        </div>

        <div class="shape square" onclick="alert('PORTFOLIO: Selected Prints')">
            <span>Work</span>
        </div>

        <div class="shape triangle" onclick="alert('CONTACT: lakraconk@mail.com')">
            <span>Mail</span>
        </div>
    </div>

    <script>
        // Lógica del Mosaico (Fondo)
        const grid = document.getElementById('grid');
        const types = ['s', 'm', 'w', 't'];
        const variations = 11;

        for (let i = 0; i < 50; i++) {
            const type = types[Math.floor(Math.random() * types.length)];
            const num = Math.floor(Math.random() * variations) + 1;
            const item = document.createElement('div');
            item.className = `item ${type}`;
            const img = document.createElement('img');
            img.src = `img/${type}${num}.webp`;
            item.appendChild(img);
            grid.appendChild(item);
        }

        // Lógica de movimiento suave (El alma del Test 19)
        const shapes = document.querySelectorAll('.shape');
        let mouseX = 0, mouseY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 40;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 40;
            
            shapes.forEach((shape, index) => {
                const speed = (index + 1) * 0.5;
                shape.style.transform = `translate(${mouseX * speed}px, ${mouseY * speed}px)`;
            });
        });
    </script>
</body>
</html>
