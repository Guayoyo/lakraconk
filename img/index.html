<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAKRACONK | Test 19</title>
    <style>
        :root {
            --white: #ffffff;
            --black: #000000;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--white);
            font-family: 'Helvetica', 'Arial', sans-serif;
            overflow-x: hidden;
        }

        /* Contenedor del Mosaico */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 300px;
            grid-auto-flow: dense;
            gap: 0;
        }

        /* Definición de celdas según tus formatos s, m, w, t */
        .item { 
            position: relative; 
            overflow: hidden; 
            background-color: var(--white);
        }
        
        .item.s { grid-column: span 1; grid-row: span 1; } /* 300x300 */
        .item.m { grid-column: span 2; grid-row: span 2; } /* 600x600 */
        .item.w { grid-column: span 4; grid-row: span 2; } /* 1200x600 */
        .item.t { grid-column: span 2; grid-row: span 4; } /* 600x1200 */

        /* Estilo de tus artes WebP */
        .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .item:hover img {
            transform: scale(1.08);
        }

        /* El bloque negro que diseñaste */
        .center-brand {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--black);
            color: var(--white);
            padding: 20px 50px;
            font-weight: 900;
            font-size: clamp(2rem, 8vw, 5rem);
            letter-spacing: -2px;
            z-index: 100;
            text-align: center;
            pointer-events: none;
            box-shadow: 0 0 40px rgba(0,0,0,0.3);
            text-transform: uppercase;
        }

        /* Ajuste para móviles */
        @media (max-width: 600px) {
            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                grid-auto-rows: 150px;
            }
            .item.w { grid-column: span 2; }
        }
    </style>
</head>
<body>

    <div class="center-brand">LAKRACONK</div>
    <div class="grid-container" id="grid"></div>

    <script>
        const grid = document.getElementById('grid');
        const types = ['s', 'm', 'w', 't'];
        const totalItemsInGrid = 60; // Cantidad de cuadros en el mosaico
        const variationsPerType = 11; // Tienes archivos del 1 al 11 (s1, s2... s11)

        function createGrid() {
            for (let i = 0; i < totalItemsInGrid; i++) {
                const type = types[Math.floor(Math.random() * types.length)];
                const randomNum = Math.floor(Math.random() * variationsPerType) + 1;
                
                const div = document.createElement('div');
                div.className = `item ${type}`;
                
                const img = document.createElement('img');
                // Busca en tu carpeta 'img' los archivos .webp
                img.src = `img/${type}${randomNum}.webp`;
                img.alt = `LAKRACONK ${type}${randomNum}`;
                
                // Si falta alguna imagen, no muestra el cuadro roto
                img.onerror = function() {
                    this.parentElement.style.display = 'none';
                };

                div.appendChild(img);
                grid.appendChild(div);
            }
        }

        createGrid();
    </script>
</body>
</html>
